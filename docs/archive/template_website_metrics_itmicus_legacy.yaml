              value: 'Web site'
        - uuid: d837f6c4b3594af8b17a20051a33e058
          name: 'Web "{$WEBSITE_METRICS_URL}" response code'
          type: DEPENDENT
          key: website_metrics.test.code
          delay: '0'
          history: 1w
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.test_code
          master_item:
            key: 'website_metrics.py["--testsite",{$WEBSITE_METRICS_URL},"--testphrase",{$WEBSITE_METRICS_PHRASE},"--timeout",{$WEBSITE_METRICS_TIMEOUT},"--debug",{$WEBSITE_METRICS_DEBUG}]'
          tags:
            - tag: Application
              value: 'Web site'
          triggers:
            - uuid: d7f074803f234ec7ab5e446d847035a8
              expression: 'last(/Template Website metrics/website_metrics.test.code,#3)<>200 and last(/Template Website metrics/website_metrics.test.code,#2)<>200 and last(/Template Website metrics/website_metrics.test.code)<>200'
              name: 'Web site "{$WEBSITE_METRICS_URL}" is down code not 200'
              priority: HIGH
            - uuid: 091469b05257404ebed5164640b7ac4d
              expression: 'nodata(/Template Website metrics/website_metrics.test.code,10m)=1'
              name: 'Web site "{$WEBSITE_METRICS_URL}" Nodata'
              priority: AVERAGE
              dependencies:
                - name: 'Web site "{$WEBSITE_METRICS_URL}" is down'
                  expression: 'sum(/Template Website metrics/website_metrics.test.status,#3)=0'
                  recovery_expression: 'sum(/Template Website metrics/website_metrics.test.status,#3)=1'
        - uuid: 6d4370336c2a493899addce84ff53205
