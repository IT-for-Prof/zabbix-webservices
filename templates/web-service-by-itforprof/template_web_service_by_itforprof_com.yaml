zabbix_export:
  version: '7.0'
  template_groups:
  - uuid: bd327ca2dab24c4aa6ba757655aa052f
    name: Templates/Applications
  templates:
  - uuid: 42159b48c68348b89c1ddea1fe82b57e
    template: Web service by itforprof.com
    name: Web service by itforprof.com
    description: |
      Full-stack web-service monitoring template for Zabbix 7.0.
      Replaces legacy "Template Website metrics (itmicus.ru)" without
      abandoned PyPI deps. Six layers, single host, single template:

        1. HTTP availability  — native web scenario.
        2. TLS + certificate  — externalscript `web_check.py cert`.
        3. Domain WHOIS       — externalscript `web_check.py whois`
                                (apex-deduped via 24h FS cache).
        4. Network diagnostics — native simple checks (TCP)..
        5. Deep TLS scan      — externalscript `web_check.py tls-scan`
                                + LLD for weak-protocol findings.
        6. HTTP/3 availability— externalscript `web_check.py http3`
                                (Alt-Svc detection + QUIC handshake, aioquic).

      All checks execute from the host's monitored_by (server or proxy),
      so request egress matches the rest of the host's monitoring.

      Design rationale and full taxonomy: docs/architecture.md.
      Validation matrix:               docs/validation.md.

      Author:  Konstantin Tyutyunnik / Константин Тютюнник
      Site:    https://itforprof.com
      Repo:    https://github.com/IT-for-Prof/zabbix-webservices
      Issues:  https://github.com/IT-for-Prof/zabbix-webservices/issues
      Credits: replaces the conceptually-similar Zabbix template
               `Template Website metrics (itmicus.ru)` by itmicus —
               https://github.com/itmicus/zabbix/tree/master/Template%20Web%20Site.
               No code was copied; macro names are kept compatible for
               in-place migration via scripts/migrate-from-itmicus.py.
      License: MIT (c) 2025-2026 Konstantin Tyutyunnik
    vendor:
      name: itforprof.com
      version: 7.0-2.2.2
    groups:
    - name: Templates/Applications
    macros:
    - macro: '{$WEB_SERVICE.URL}'
      description: Full URL to monitor, e.g. https://example.com/healthz. REQUIRED.
    - macro: '{$WEB_SERVICE.PHRASE}'
      description: Substring/regex expected on the response body. Optional - leave empty to skip phrase check.
    - macro: '{$WEB_SERVICE.PHRASE.FLAGS}'
      value: (?i)
      description: PCRE flag prefix applied to {$WEB_SERVICE.PHRASE}. Default '(?i)' = case-insensitive. Set to empty string for case-sensitive matching, or '(?s)' for dotall, etc.
    - macro: '{$WEB_SERVICE.TIMEOUT}'
      value: '15'
      description: HTTP request timeout in seconds.
    - macro: '{$WEB_SERVICE.EXPECTED_CODE}'
      value: '200'
      description: HTTP status code(s) considered healthy. Comma-separated, ranges supported (e.g. "200,204,301-302").
    - macro: '{$WEB_SERVICE.USER_AGENT}'
      value: Zabbix-WebService-by-itforprof/2.0
      description: User-Agent header for the web scenario.
    - macro: '{$WEB_SERVICE.CHECK.INTERVAL}'
      value: 1m
      description: How often the web scenario runs.
    - macro: '{$WEB_SERVICE.CERT.CHECK.INTERVAL}'
      value: 5m
      description: How often the TLS-cert master item runs.
    - macro: '{$WEB_SERVICE.WHOIS.CHECK.INTERVAL}'
      value: 1h
      description: How often the WHOIS master item runs (mostly cache hits).
    - macro: '{$WEB_SERVICE.WHOIS.CACHE.TTL}'
      value: '86400'
      description: WHOIS cache TTL in seconds (passed to web_check.py whois --ttl).
    - macro: '{$WEB_SERVICE.TLS_SCAN.CHECK.INTERVAL}'
      value: 1d
      description: How often the deep TLS scan runs.
    - macro: '{$WEB_SERVICE.HTTP3.CHECK.INTERVAL}'
      value: 5m
      description: How often the HTTP/3 master item runs.
    - macro: '{$WEB_SERVICE.HTTP3.TIMEOUT}'
      value: '8'
      description: Combined HEAD + QUIC handshake timeout in seconds.
    - macro: '{$WEB_SERVICE.HTTP3.SLOW_MS}'
      value: '1000'
      description: QUIC handshake WARNING threshold in milliseconds. Default 1000ms tolerates intercontinental UDP+QUIC handshake. Drop to 250 for LAN.
    - macro: '{$WEB_SERVICE.DIAG.CHECK.INTERVAL}'
      value: 5m
      description: How often diagnostic simple-check items run.
    - macro: '{$WEB_SERVICE.SLOW.WARN}'
      value: '10'
      description: Avg HTTP response time over 10m (seconds) above which a WARNING trigger fires. Default 10s tolerates intercontinental traffic; drop to 5 for regional sites.
    - macro: '{$WEB_SERVICE.NODATA.PERIOD}'
      value: 10m
      description: Period of no-data before the No-data trigger fires (web scenario item).
    - macro: '{$WEB_SERVICE.CERT.WARN_DAYS}'
      value: '30'
      description: Cert expiry INFO trigger threshold (days).
    - macro: '{$WEB_SERVICE.CERT.NOTICE_DAYS}'
      value: '14'
      description: Cert expiry WARNING trigger threshold (days).
    - macro: '{$WEB_SERVICE.CERT.CRIT_DAYS}'
      value: '7'
      description: Cert expiry HIGH trigger threshold (days).
    - macro: '{$WEB_SERVICE.CERT.MIN_KEY_RSA}'
      value: '2048'
      description: Minimum acceptable RSA key size (bits).
    - macro: '{$WEB_SERVICE.CERT.MIN_KEY_ECDSA}'
      value: '256'
      description: Minimum acceptable ECDSA key size (bits).
    - macro: '{$WEB_SERVICE.WHOIS.WARN_DAYS}'
      value: '30'
      description: Domain expires within N days WARNING trigger threshold.
    - macro: '{$WEB_SERVICE.WHOIS.NOTICE_DAYS}'
      value: '7'
      description: Domain expires within N days AVERAGE trigger threshold.
    - macro: '{$WEB_SERVICE.WHOIS.CRIT_DAYS}'
      value: '1'
      description: Domain expires within N days HIGH trigger threshold.
    - macro: '{$WEB_SERVICE.HOST}'
      description: Host or IP for diagnostic simple checks (net.dns.record / net.tcp.service.perf). Defaults to {$WEB_SERVICE.URL} host; override per host if needed.
    - macro: '{$WEB_SERVICE.TCP.SLOW_SEC}'
      value: '3'
      description: net.tcp.service.perf WARNING threshold in seconds. Default 3s tolerates intercontinental TCP+TLS handshake (~300-800ms typical) plus headroom. Drop to 1 for LAN/regional monitoring.
    tags:
    - tag: class
      value: web-service
    httptests:
    - uuid: f41f42e32d1e4deca035b04fae2d3281
      name: Web service
      delay: '{$WEB_SERVICE.CHECK.INTERVAL}'
      agent: '{$WEB_SERVICE.USER_AGENT}'
      steps:
      - name: GET
        url: '{$WEB_SERVICE.URL}'
        timeout: '{$WEB_SERVICE.TIMEOUT}'
        status_codes: '{$WEB_SERVICE.EXPECTED_CODE}'
        required: '{$WEB_SERVICE.PHRASE.FLAGS}{$WEB_SERVICE.PHRASE}'
        follow_redirects: 'YES'
        retrieve_mode: BODY
      tags:
      - tag: scope
        value: availability
    items:
    - uuid: e2bf4e622bc04bfdab7d9283c478663b
      name: 'Cert: probe (master JSON)'
      type: EXTERNAL
      key: web_check.py["cert","{$WEB_SERVICE.URL}"]
      delay: '{$WEB_SERVICE.CERT.CHECK.INTERVAL}'
      history: 7d
      trends: '0'
      value_type: TEXT
      description: 'Runs `web_check.py cert <url>` on the host''s monitored_by.

        Output is a JSON object consumed by the dependent items below

        (subject/issuer/SANs/fingerprint/days-to-expire/chain_status/...).

        Always exits 0; failures encode as {"ok": false, "error_code": ...}.

        '
      tags:
      - tag: scope
        value: tls
      - tag: layer
        value: '2'
      triggers:
      - uuid: be5d249ccc8a4058ab24198c61ec5eec
        expression: last(/Web service by itforprof.com/web.test.fail[Web service])<>0
        name: Web service is failing
        event_name: 'Web service failed: {$WEB_SERVICE.URL} — {HOST.NAME} ({HOST.HOST})'
        opdata: 'HTTP {?last(/Web service by itforprof.com/web.test.rspcode[Web service,GET])} | err: {?last(/Web service by itforprof.com/web.test.error[Web service])}'
        priority: HIGH
        description: 'The web scenario reports a failed step. Covers all hard failures:

          non-matching HTTP status code, missing required phrase, timeout,

          DNS resolution error, TLS handshake failure, or connection refused.

          '
        tags:
        - tag: scope
          value: availability
        - tag: url
          value: '{$WEB_SERVICE.URL}'
        dependencies:
        - name: Web service no data received
          expression: nodata(/Web service by itforprof.com/web.test.fail[Web service],{$WEB_SERVICE.NODATA.PERIOD})=1
      - uuid: ab9b1814328d4275b1c568d64f213acc
        expression: avg(/Web service by itforprof.com/web.test.time[Web service,GET,resp],10m)>{$WEB_SERVICE.SLOW.WARN}
        name: Web service slow response time
        event_name: 'Web service slow: avg {ITEM.LASTVALUE1} over 10m (threshold {$WEB_SERVICE.SLOW.WARN}s) — {$WEB_SERVICE.URL} on {HOST.NAME} ({HOST.HOST})'
        opdata: 'avg(10m): {ITEM.LASTVALUE1}s'
        priority: WARNING
        description: 'Average response time over the last 10 minutes exceeds the

          {$WEB_SERVICE.SLOW.WARN} threshold.

          '
        dependencies:
        - name: Web service is failing
          expression: last(/Web service by itforprof.com/web.test.fail[Web service])<>0
        tags:
        - tag: scope
          value: performance
        - tag: url
          value: '{$WEB_SERVICE.URL}'
      - uuid: ab645603a19146d1b7eb21c8d7b8d9a8
        expression: nodata(/Web service by itforprof.com/web.test.fail[Web service],{$WEB_SERVICE.NODATA.PERIOD})=1
        name: Web service no data received
        event_name: 'Web service: no data for {$WEB_SERVICE.NODATA.PERIOD} — {$WEB_SERVICE.URL} on {HOST.HOST}'
        priority: AVERAGE
        description: The web scenario item has not received fresh data for the configured period.
        tags:
        - tag: scope
          value: data-collection
        - tag: url
          value: '{$WEB_SERVICE.URL}'
      - uuid: 2c7f847016824c66bb27c2198d39c5a6
        expression: nodata(/Web service by itforprof.com/web_check.py["cert","{$WEB_SERVICE.URL}"],15m)=1
        name: Cert externalscript no data received
        event_name: 'web_check.py cert: no fresh value in 15m — {$WEB_SERVICE.URL} on {HOST.HOST}'
        priority: AVERAGE
        description: 'The cert master item has not received a fresh value for 15m

          (3× its default delay). The externalscript is not executing at all —

          check `/usr/lib/zabbix/externalscripts/web_check.py` exists and is

          executable on this host''s monitored_by, and that the venv at

          /opt/web_check/venv is intact.

          '
        tags:
        - tag: scope
          value: data-collection
        - tag: url
          value: '{$WEB_SERVICE.URL}'
    - uuid: 72a084cb2bf74a22b893bd98dc8e1e20
      name: 'Cert: days to expire'
      type: DEPENDENT
      key: web_check.cert.days_to_expire
      value_type: FLOAT
      units: d
      master_item:
        key: web_check.py["cert","{$WEB_SERVICE.URL}"]
      preprocessing:
      - type: JSONPATH
        parameters:
        - $.cert.days_to_expire
        error_handler: CUSTOM_ERROR
        error_handler_params: 'No cert data: web_check.py cert returned error envelope (see master item JSON).'
      - type: DISCARD_UNCHANGED_HEARTBEAT
        parameters:
        - 1h
      tags:
      - tag: scope
        value: tls
      triggers:
      - uuid: d89b15901e1d4a1f959ea8cf60705fdd
        expression: last(/Web service by itforprof.com/web_check.cert.days_to_expire)<0
        name: Cert expired
        event_name: TLS cert expired ({ITEM.LASTVALUE1} past not_after) — {$WEB_SERVICE.URL} on {HOST.HOST}
        priority: DISASTER
        manual_close: 'YES'
        description: The current TLS certificate is past its not_after date.
        tags:
        - tag: scope
          value: tls
        - tag: url
          value: '{$WEB_SERVICE.URL}'
        dependencies:
        - name: Cert check failing
          expression: last(/Web service by itforprof.com/web_check.cert.ok)=0
      - uuid: 3089073dc0214f2aa481077338c2ea9c
        expression: 'last(/Web service by itforprof.com/web_check.cert.days_to_expire)>=0 and

          last(/Web service by itforprof.com/web_check.cert.days_to_expire)<{$WEB_SERVICE.CERT.CRIT_DAYS}

          '
        name: Cert expires within {$WEB_SERVICE.CERT.CRIT_DAYS} days
        priority: HIGH
        manual_close: 'YES'
        description: The TLS certificate will expire soon. Rotate now.
        dependencies:
        - name: Cert expired
          expression: last(/Web service by itforprof.com/web_check.cert.days_to_expire)<0
        tags:
        - tag: scope
          value: tls
        - tag: url
          value: '{$WEB_SERVICE.URL}'
        event_name: TLS cert expires in {ITEM.LASTVALUE1} (< {$WEB_SERVICE.CERT.CRIT_DAYS}d) — {$WEB_SERVICE.URL} on {HOST.HOST}
      - uuid: 99fbafa657f04362baed2fb2ede69416
        expression: 'last(/Web service by itforprof.com/web_check.cert.days_to_expire)>={$WEB_SERVICE.CERT.CRIT_DAYS} and

          last(/Web service by itforprof.com/web_check.cert.days_to_expire)<{$WEB_SERVICE.CERT.NOTICE_DAYS}

          '
        name: Cert expires within {$WEB_SERVICE.CERT.NOTICE_DAYS} days
        priority: WARNING
        manual_close: 'YES'
        description: The TLS certificate will expire within the WARNING threshold.
        dependencies:
        - name: Cert expires within {$WEB_SERVICE.CERT.CRIT_DAYS} days
          expression: 'last(/Web service by itforprof.com/web_check.cert.days_to_expire)>=0 and

            last(/Web service by itforprof.com/web_check.cert.days_to_expire)<{$WEB_SERVICE.CERT.CRIT_DAYS}

            '
        tags:
        - tag: scope
          value: tls
        - tag: url
          value: '{$WEB_SERVICE.URL}'
        event_name: TLS cert expires in {ITEM.LASTVALUE1} (< {$WEB_SERVICE.CERT.NOTICE_DAYS}d) — {$WEB_SERVICE.URL} on {HOST.HOST}
      - uuid: 373407925a4d4be782b5e09df0ddbef3
        expression: 'last(/Web service by itforprof.com/web_check.cert.days_to_expire)>={$WEB_SERVICE.CERT.NOTICE_DAYS} and

          last(/Web service by itforprof.com/web_check.cert.days_to_expire)<{$WEB_SERVICE.CERT.WARN_DAYS}

          '
        name: Cert expires within {$WEB_SERVICE.CERT.WARN_DAYS} days
        priority: INFO
        manual_close: 'YES'
        description: 'Heads-up: cert renewal window approaching.'
        dependencies:
        - name: Cert expires within {$WEB_SERVICE.CERT.NOTICE_DAYS} days
          expression: 'last(/Web service by itforprof.com/web_check.cert.days_to_expire)>={$WEB_SERVICE.CERT.CRIT_DAYS} and

            last(/Web service by itforprof.com/web_check.cert.days_to_expire)<{$WEB_SERVICE.CERT.NOTICE_DAYS}

            '
        tags:
        - tag: scope
          value: tls
        - tag: url
          value: '{$WEB_SERVICE.URL}'
        event_name: TLS cert expires in {ITEM.LASTVALUE1} (< {$WEB_SERVICE.CERT.WARN_DAYS}d) — {$WEB_SERVICE.URL} on {HOST.HOST}
    - uuid: 33c8787e706e49ddb454078027b3c146
      name: 'Cert: not_after'
      type: DEPENDENT
      key: web_check.cert.not_after
      value_type: CHAR
      master_item:
        key: web_check.py["cert","{$WEB_SERVICE.URL}"]
      preprocessing:
      - type: JSONPATH
        parameters:
        - $.cert.not_after
        error_handler: CUSTOM_ERROR
        error_handler_params: 'No cert data: web_check.py cert returned error envelope (see master item JSON).'
      - type: DISCARD_UNCHANGED_HEARTBEAT
        parameters:
        - 1d
      tags:
      - tag: scope
        value: tls
    - uuid: 82ac239585b84ff99954de8d9e1eaf6c
      name: 'Cert: subject CN'
      type: DEPENDENT
      key: web_check.cert.subject_cn
      value_type: CHAR
      master_item:
        key: web_check.py["cert","{$WEB_SERVICE.URL}"]
      preprocessing:
      - type: JSONPATH
        parameters:
        - $.cert.subject_cn
        error_handler: CUSTOM_ERROR
        error_handler_params: 'No cert data: web_check.py cert returned error envelope (see master item JSON).'
      - type: DISCARD_UNCHANGED_HEARTBEAT
        parameters:
        - 1d
      tags:
      - tag: scope
        value: tls
    - uuid: 47ffd433b4d34c09868bec7b30994a9d
      name: 'Cert: issuer CN'
      type: DEPENDENT
      key: web_check.cert.issuer_cn
      value_type: CHAR
      master_item:
        key: web_check.py["cert","{$WEB_SERVICE.URL}"]
      preprocessing:
      - type: JSONPATH
        parameters:
        - $.cert.issuer_cn
        error_handler: CUSTOM_ERROR
        error_handler_params: 'No cert data: web_check.py cert returned error envelope (see master item JSON).'
      - type: DISCARD_UNCHANGED_HEARTBEAT
        parameters:
        - 1d
      tags:
      - tag: scope
        value: tls
    - uuid: 0f01bf0210ad41efbf7fba6ffefed76a
      name: 'Cert: issuer organization'
      type: DEPENDENT
      key: web_check.cert.issuer_org
      value_type: CHAR
      master_item:
        key: web_check.py["cert","{$WEB_SERVICE.URL}"]
      preprocessing:
      - type: JSONPATH
        parameters:
        - $.cert.issuer_org
        error_handler: CUSTOM_ERROR
        error_handler_params: 'No cert data: web_check.py cert returned error envelope (see master item JSON).'
      - type: DISCARD_UNCHANGED_HEARTBEAT
        parameters:
        - 1d
      tags:
      - tag: scope
        value: tls
    - uuid: 37197e1c4d3b4e82849f0e95b303495a
      name: 'Cert: serial'
      type: DEPENDENT
      key: web_check.cert.serial
      value_type: CHAR
      master_item:
        key: web_check.py["cert","{$WEB_SERVICE.URL}"]
      preprocessing:
      - type: JSONPATH
        parameters:
        - $.cert.serial
        error_handler: CUSTOM_ERROR
        error_handler_params: 'No cert data: web_check.py cert returned error envelope (see master item JSON).'
      - type: DISCARD_UNCHANGED_HEARTBEAT
        parameters:
        - 1d
      tags:
      - tag: scope
        value: tls
    - uuid: 42e744755d7d4d2cb70cbf34abe99d2c
      name: 'Cert: SANs'
      type: DEPENDENT
      key: web_check.cert.sans
      value_type: TEXT
      master_item:
        key: web_check.py["cert","{$WEB_SERVICE.URL}"]
      preprocessing:
      - type: JSONPATH
        parameters:
        - $.cert.sans
        error_handler: CUSTOM_ERROR
        error_handler_params: 'No cert data: web_check.py cert returned error envelope (see master item JSON).'
      - type: DISCARD_UNCHANGED_HEARTBEAT
        parameters:
        - 1d
      tags:
      - tag: scope
        value: tls
    - uuid: c91e0d34102c45faa5d6b393b11e7f40
      name: 'Cert: SHA-256 fingerprint'
      type: DEPENDENT
      key: web_check.cert.fingerprint_sha256
      value_type: CHAR
      master_item:
        key: web_check.py["cert","{$WEB_SERVICE.URL}"]
      preprocessing:
      - type: JSONPATH
        parameters:
        - $.cert.fingerprint_sha256
        error_handler: CUSTOM_ERROR
        error_handler_params: 'No cert data: web_check.py cert returned error envelope (see master item JSON).'
      - type: DISCARD_UNCHANGED_HEARTBEAT
        parameters:
        - 1d
      tags:
      - tag: scope
        value: tls
      triggers:
      - uuid: cc2dd9ddb02a418192df1a3fe94696ce
        expression: change(/Web service by itforprof.com/web_check.cert.fingerprint_sha256)=1
        name: Cert rotated
        priority: INFO
        description: The SHA-256 fingerprint changed since the last poll — a new cert was deployed. Informational; usually expected (Let's Encrypt renews every ~60 days).
        tags:
        - tag: scope
          value: tls
        - tag: url
          value: '{$WEB_SERVICE.URL}'
        dependencies:
        - name: Cert check failing
          expression: last(/Web service by itforprof.com/web_check.cert.ok)=0
        event_name: TLS cert rotated (new fingerprint {ITEM.LASTVALUE1}) — {$WEB_SERVICE.URL} on {HOST.HOST}
        manual_close: 'YES'
      - uuid: d03134c8f17c4610ace39c55e9d74e52
        expression: 'change(/Web service by itforprof.com/web_check.cert.fingerprint_sha256)=1 and

          last(/Web service by itforprof.com/web_check.cert.days_to_expire)<14

          '
        name: Cert rotated unexpectedly (was about to expire)
        priority: HIGH
        description: 'The cert fingerprint changed but the days_to_expire reading just

          before rotation was already under 14d. That can mean the previous

          cert expired before rotation (brief outage window) — investigate.

          '
        tags:
        - tag: scope
          value: tls
        - tag: url
          value: '{$WEB_SERVICE.URL}'
        dependencies:
        - name: Cert check failing
          expression: last(/Web service by itforprof.com/web_check.cert.ok)=0
        event_name: TLS cert rotated with <14d remaining — {$WEB_SERVICE.URL} on {HOST.HOST}
        manual_close: 'YES'
    - uuid: 127abf2af8b342839bba3ac01406154f
      name: 'Cert: signature algorithm'
      type: DEPENDENT
      key: web_check.cert.signature_algorithm
      value_type: CHAR
      master_item:
        key: web_check.py["cert","{$WEB_SERVICE.URL}"]
      preprocessing:
      - type: JSONPATH
        parameters:
        - $.cert.signature_algorithm
        error_handler: CUSTOM_ERROR
        error_handler_params: 'No cert data: web_check.py cert returned error envelope (see master item JSON).'
      - type: DISCARD_UNCHANGED_HEARTBEAT
        parameters:
        - 1d
      tags:
      - tag: scope
        value: tls
      triggers:
      - uuid: 986270e029c946f5a15a3e38d5a07012
        expression: find(/Web service by itforprof.com/web_check.cert.signature_algorithm,,"regexp","(?i)(sha1|md5)")=1
        name: Cert weak signature algorithm
        event_name: 'TLS cert signed with weak algorithm: {ITEM.LASTVALUE1} — {$WEB_SERVICE.URL} on {HOST.HOST}'
        priority: WARNING
        description: The leaf certificate is signed with SHA-1 or MD5 — modern clients distrust both.
        tags:
        - tag: scope
          value: tls
        - tag: url
          value: '{$WEB_SERVICE.URL}'
        dependencies:
        - name: Cert check failing
          expression: last(/Web service by itforprof.com/web_check.cert.ok)=0
    - uuid: b1a520ca067d4c58b4c562a3916bf061
      name: 'Cert: public key algorithm'
      type: DEPENDENT
      key: web_check.cert.public_key_algorithm
      value_type: CHAR
      master_item:
        key: web_check.py["cert","{$WEB_SERVICE.URL}"]
      preprocessing:
      - type: JSONPATH
        parameters:
        - $.cert.public_key_algorithm
        error_handler: CUSTOM_ERROR
        error_handler_params: 'No cert data: web_check.py cert returned error envelope (see master item JSON).'
      - type: DISCARD_UNCHANGED_HEARTBEAT
        parameters:
        - 1d
      tags:
      - tag: scope
        value: tls
      triggers:
      - uuid: bd83f5d086ed47da9a98085754ef44d7
        expression: "(last(/Web service by itforprof.com/web_check.cert.public_key_algorithm)=\"rsa\" and\n last(/Web service by itforprof.com/web_check.cert.public_key_bits)<{$WEB_SERVICE.CERT.MIN_KEY_RSA})\
          \ or\n(last(/Web service by itforprof.com/web_check.cert.public_key_algorithm)=\"ecdsa\" and\n last(/Web service by itforprof.com/web_check.cert.public_key_bits)<{$WEB_SERVICE.CERT.MIN_KEY_ECDSA})\n"
        name: Cert weak public key
        event_name: 'TLS cert weak key: {ITEM.LASTVALUE1} {ITEM.LASTVALUE2} bits — {$WEB_SERVICE.URL} on {HOST.HOST}'
        priority: WARNING
        description: Certificate public key is shorter than the configured minimum for its algorithm.
        tags:
        - tag: scope
          value: tls
        - tag: url
