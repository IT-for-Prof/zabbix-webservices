    - uuid: 4a9c1b0e8b2d4f1c8e3a7b6c5d4e3f21
      name: 'HTTP/3: probe (master JSON)'
      type: EXTERNAL
      key: web_check.py["http3","{$WEB_SERVICE.URL}"]
      delay: '{$WEB_SERVICE.HTTP3.CHECK.INTERVAL}'
      history: 14d
      trends: '0'
      value_type: TEXT
      description: 'Runs `web_check.py http3 <url>` on the host''s monitored_by.

        Two-step probe: HEAD request reads Alt-Svc; if h3 is advertised

        a QUIC handshake (ALPN=h3) is attempted on UDP/port. Returns

        alt_svc_advertised, h3_reachable, handshake_ms, alpn, quic_version.

        Hosts that do not advertise h3 stay silent (no triggers fire).'
      tags:
      - tag: scope
        value: http3
      - tag: layer
        value: '6'
      triggers:
      - uuid: 4df09b7121514ffc853a17a40a13ba32
        expression: last(/Web service by itforprof.com/web_check.http3.alt_svc_advertised)=1 and last(/Web service by itforprof.com/web_check.http3.reachable)=0
        name: HTTP/3 advertised but unreachable
        event_name: 'HTTP/3 advertised but unreachable: {$WEB_SERVICE.URL} on {HOST.HOST}'
        priority: HIGH
        description: 'The server advertises HTTP/3 in its Alt-Svc header but our QUIC

          handshake from this proxy fails. Causes: UDP/443 dropped on the

          path, server-side QUIC stack misconfigured, or CDN regression.

          Cross-check with the network-diagnostic items.'
        tags:
        - tag: scope
          value: http3
        - tag: url
          value: '{$WEB_SERVICE.URL}'
        dependencies:
        - name: HTTP/3 check failing
          expression: last(/Web service by itforprof.com/web_check.http3.ok)=0
      - uuid: 4cc0745f57df4d9788d521f5006b444c
        expression: avg(/Web service by itforprof.com/web_check.http3.handshake_ms,1h)>{$WEB_SERVICE.HTTP3.SLOW_MS} and avg(/Web service by itforprof.com/web_check.http3.handshake_ms,1h)>0
        name: HTTP/3 handshake slow
        event_name: 'HTTP/3 handshake to {$WEB_SERVICE.URL} slow: avg {ITEM.LASTVALUE1} over 1h (threshold {$WEB_SERVICE.HTTP3.SLOW_MS}ms) — {HOST.NAME} ({HOST.HOST})'
        priority: WARNING
        description: QUIC handshake average over 1h exceeds {$WEB_SERVICE.HTTP3.SLOW_MS}ms. http3 master polls every 5m so 1h gives a stable rolling sample.
        tags:
        - tag: scope
          value: http3
        - tag: url
          value: '{$WEB_SERVICE.URL}'
        dependencies:
        - name: HTTP/3 advertised but unreachable
          expression: last(/Web service by itforprof.com/web_check.http3.alt_svc_advertised)=1 and last(/Web service by itforprof.com/web_check.http3.reachable)=0
      - uuid: 1b8861a5003f4f2082c745335694954a
        expression: last(/Web service by itforprof.com/web_check.http3.ok)=0
        name: HTTP/3 check failing
        event_name: web_check.py http3 reports ok=false — {$WEB_SERVICE.URL} on {HOST.HOST}
        priority: INFO
        description: The http3 externalscript itself failed (bad URL, etc). Investigate via master item.
        tags:
        - tag: scope
          value: http3
        - tag: url
          value: '{$WEB_SERVICE.URL}'
        dependencies:
        - name: HTTP/3 externalscript no data received
          expression: nodata(/Web service by itforprof.com/web_check.py["http3","{$WEB_SERVICE.URL}"],15m)=1
        manual_close: 'YES'
      - uuid: 5b621e14f97041a1bee7eb7502b88080
        expression: nodata(/Web service by itforprof.com/web_check.py["http3","{$WEB_SERVICE.URL}"],15m)=1
        name: HTTP/3 externalscript no data received
        event_name: 'web_check.py http3: no fresh value in 15m — {$WEB_SERVICE.URL} on {HOST.HOST}'
        priority: AVERAGE
        description: 'The HTTP/3 master item has not received a fresh value for 15m

          (3× its default 5m delay). Externalscript not executing.'
        tags:
        - tag: scope
          value: data-collection
        - tag: url
          value: '{$WEB_SERVICE.URL}'
    - uuid: 5b8a2c1f9c3e4012a4b8c7d6e5f43210
      name: 'HTTP/3: Alt-Svc advertises h3'
