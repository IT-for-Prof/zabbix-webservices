    discovery_rules:
    - uuid: 9cfbb8fb495b48d79c267e58b9e1bc2a
      name: TLS findings discovery
      type: EXTERNAL
      key: web_check.py["discover-tls","{$WEB_SERVICE.URL}"]
      delay: '{$WEB_SERVICE.TLS_SCAN.CHECK.INTERVAL}'
      description: 'Emits one LLD entry per weak protocol/cipher reported by tls-scan.

        Macros: {#TLS_FINDING}, {#TLS_FINDING.CATEGORY}, {#TLS_FINDING.SEVERITY}.

        '
      lifetime: 7d
      item_prototypes:
      - uuid: bfa90adeee7345cda61815a8e3cb4b62
        name: 'TLS scan finding: {#TLS_FINDING}'
        type: DEPENDENT
        key: web_check.tls_scan.finding[{#TLS_FINDING}]
        value_type: CHAR
        master_item:
          key: web_check.py["tls-scan","{$WEB_SERVICE.URL}"]
        preprocessing:
        - type: JSONPATH
          parameters:
          - $.weak_findings[?(@.name == "{#TLS_FINDING}")].severity.first()
          error_handler: CUSTOM_ERROR
          error_handler_params: 'No tls-scan data: web_check.py tls-scan returned error envelope (see master item JSON).'
        - type: DISCARD_UNCHANGED_HEARTBEAT
          parameters:
          - 7d
        tags:
        - tag: scope
          value: tls-scan
        - tag: tls.finding
          value: '{#TLS_FINDING}'
        - tag: tls.category
          value: '{#TLS_FINDING.CATEGORY}'
        trigger_prototypes:
        - uuid: 232029b8b19f431896d533781cda191b
          expression: length(last(/Web service by itforprof.com/web_check.tls_scan.finding[{#TLS_FINDING}]))>0
          name: 'TLS weak {#TLS_FINDING.CATEGORY}: {#TLS_FINDING}'
          event_name: 'TLS weak {#TLS_FINDING.CATEGORY} negotiable: {#TLS_FINDING} on {$WEB_SERVICE.URL} ({HOST.HOST})'
          priority: WARNING
          description: 'The daily TLS scan negotiated a deprecated protocol or weak

            cipher family. Investigate the server''s TLS configuration.

            '
          tags:
          - tag: scope
            value: tls-scan
          - tag: tls.finding
            value: '{#TLS_FINDING}'
          - tag: url
            value: '{$WEB_SERVICE.URL}'
          dependencies:
          - name: TLS scan externalscript no data received
            expression: nodata(/Web service by itforprof.com/web_check.py["tls-scan","{$WEB_SERVICE.URL}"],3d)=1
    valuemaps:
    - uuid: 09b3d107743842c3b05d7beccbb7b5be
      name: 'web_check: boolean'
      mappings:
      - value: '0'
        newvalue: 'no'
      - value: '1'
        newvalue: 'yes'
