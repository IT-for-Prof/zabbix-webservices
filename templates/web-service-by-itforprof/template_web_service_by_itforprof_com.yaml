        name: TCP 443 connect slow
        priority: WARNING
        description: TCP/443 average connect time over 10m exceeds {$WEB_SERVICE.TCP.SLOW_SEC}s. Using avg (not last) so single network blips do not page; only sustained slowness fires. Bump the threshold
